<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Tạo voucher - Certain Shop</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link rel="stylesheet" th:href="@{/css/admin.css}"/>
</head>
<body>
<div class="d-flex">
    <div th:replace="~{fragments/admin-layout :: adminSidebar}"></div>
    <main class="flex-fill bg-light" style="min-height:100vh">
        <div class="bg-dark text-white px-4 py-2 d-flex align-items-center justify-content-between">
            <h5 class="mb-0 fw-bold"><i class="bi bi-plus-circle me-2 text-warning"></i>Tạo voucher mới</h5>
            <a href="/quan-ly/khuyen-mai" class="btn btn-outline-light btn-sm">
                <i class="bi bi-arrow-left me-1"></i>Quay lại
            </a>
        </div>
        <div class="container-fluid p-4">
            <div th:replace="~{fragments/admin-layout :: flashMessages}"></div>
            <div class="row justify-content-center">
                <div class="col-lg-7">
                    <div class="card border-0 shadow-sm">
                        <div class="card-header bg-white fw-bold border-bottom">Thông tin voucher</div>
                        <form th:action="@{/quan-ly/khuyen-mai/luu}" method="post" class="card-body">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <div class="mb-3 row">
                                <label class="col-sm-4 col-form-label fw-semibold">Tên chương trình</label>
                                <div class="col-sm-8">
                                    <input type="text" class="form-control" name="tenKhuyenMai" required placeholder="VD: Giảm giá mùa hè"/>
                                </div>
                            </div>
                            <div class="mb-3 row">
                                <label class="col-sm-4 col-form-label fw-semibold">Mã voucher</label>
                                <div class="col-sm-8">
                                    <div class="input-group">
                                        <input type="text" class="form-control text-uppercase" name="maKhuyenMai" id="maVoucher" required placeholder="VD: SALE10"/>
                                        <button type="button" class="btn btn-outline-secondary" onclick="sinhMa()">Tạo tự động</button>
                                    </div>
                                    <small class="text-muted">Không dấu, không khoảng cách</small>
                                </div>
                            </div>
                            <div class="mb-3 row">
                                <label class="col-sm-4 col-form-label fw-semibold">Loại giảm giá</label>
                                <div class="col-sm-8">
                                    <select class="form-select" name="loaiGiam" id="loaiGiam" onchange="toggleLoai()">
                                        <option value="PHAN_TRAM">Phần trăm (%)</option>
                                        <option value="SO_TIEN">Số tiền cố định (đ)</option>
                                    </select>
                                </div>
                            </div>
                            <div class="mb-3 row">
                                <label class="col-sm-4 col-form-label fw-semibold">Giá trị giảm</label>
                                <div class="col-sm-8">
                                    <div class="input-group">
                                        <input type="number" class="form-control" name="giaTriGiam" min="0" required placeholder="0"/>
                                        <span class="input-group-text" id="donViGiam">%</span>
                                    </div>
                                </div>
                            </div>
                            <div class="mb-3 row" id="giaTriToiDaRow">
                                <label class="col-sm-4 col-form-label fw-semibold">Giảm tối đa (đ)</label>
                                <div class="col-sm-8">
                                    <input type="number" class="form-control" name="giaTriToiDa" min="0" placeholder="Để trống = không giới hạn"/>
                                </div>
                            </div>
                            <div class="mb-3 row">
                                <label class="col-sm-4 col-form-label fw-semibold">Đơn tối thiểu (đ)</label>
                                <div class="col-sm-8">
                                    <input type="number" class="form-control" name="donHangToiThieu" min="0" value="0"/>
                                </div>
                            </div>
                            <div class="mb-3 row">
                                <label class="col-sm-4 col-form-label fw-semibold">Số lượng tối đa</label>
                                <div class="col-sm-8">
                                    <input type="number" class="form-control" name="soLuongToiDa" min="1" required value="100"/>
                                </div>
                            </div>
                            <div class="mb-3 row">
                                <label class="col-sm-4 col-form-label fw-semibold">Ngày bắt đầu</label>
                                <div class="col-sm-8">
                                    <input type="datetime-local" class="form-control" name="ngayBatDau" required/>
                                </div>
                            </div>
                            <div class="mb-3 row">
                                <label class="col-sm-4 col-form-label fw-semibold">Ngày kết thúc</label>
                                <div class="col-sm-8">
                                    <input type="datetime-local" class="form-control" name="ngayKetThuc" required/>
                                </div>
                            </div>
                            <div class="mb-3 row">
                                <label class="col-sm-4 col-form-label fw-semibold">Trạng thái</label>
                                <div class="col-sm-8">
                                    <select class="form-select" name="trangThai">
                                        <option value="DANG_HOAT_DONG">Đang hoạt động</option>
                                        <option value="TAM_DUNG">Tạm dừng</option>
                                    </select>
                                </div>
                            </div>
                            <div class="mb-3 row">
                                <label class="col-sm-4 col-form-label fw-semibold">Mô tả</label>
                                <div class="col-sm-8">
                                    <textarea class="form-control" name="moTa" rows="2"></textarea>
                                </div>
                            </div>
                            <div class="text-end">
                                <a href="/quan-ly/khuyen-mai" class="btn btn-secondary me-2">Hủy</a>
                                <button type="submit" class="btn btn-success">
                                    <i class="bi bi-check-circle me-1"></i>Tạo voucher
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function toggleLoai() {
        const loai = document.getElementById('loaiGiam').value;
        document.getElementById('donViGiam').textContent = loai === 'PHAN_TRAM' ? '%' : 'đ';
        document.getElementById('giaTriToiDaRow').style.display = loai === 'PHAN_TRAM' ? '' : 'none';
    }
    function sinhMa() {
        const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
        let ma = '';
        for (let i = 0; i < 8; i++) ma += chars.charAt(Math.floor(Math.random() * chars.length));
        document.getElementById('maVoucher').value = ma;
    }
    toggleLoai();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Sửa voucher - Certain Shop</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link rel="stylesheet" th:href="@{/css/admin.css}"/>
</head>
<body>
<div class="d-flex">
    <div th:replace="~{fragments/admin-layout :: adminSidebar}"></div>
    <main class="flex-fill bg-light" style="min-height:100vh">
        <div class="bg-dark text-white px-4 py-2 d-flex align-items-center justify-content-between">
            <h5 class="mb-0 fw-bold"><i class="bi bi-pencil me-2 text-warning"></i>Sửa voucher: <span th:text="${khuyenMai.maKhuyenMai}"></span></h5>
            <a href="/quan-ly/khuyen-mai" class="btn btn-outline-light btn-sm">
                <i class="bi bi-arrow-left me-1"></i>Quay lại
            </a>
        </div>
        <div class="container-fluid p-4">
            <div th:replace="~{fragments/admin-layout :: flashMessages}"></div>
            <div class="row justify-content-center">
                <div class="col-lg-7">
                    <div class="card border-0 shadow-sm">
                        <div class="card-header bg-white fw-bold border-bottom">Chỉnh sửa thông tin voucher</div>
                        <form th:action="@{/quan-ly/khuyen-mai/} + ${khuyenMai.id} + '/cap-nhat'" method="post" class="card-body">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <div class="mb-3 row">
                                <label class="col-sm-4 col-form-label fw-semibold">Tên chương trình</label>
                                <div class="col-sm-8">
                                    <input type="text" class="form-control" name="tenKhuyenMai" th:value="${khuyenMai.tenKhuyenMai}" required/>
                                </div>
                            </div>
                            <div class="mb-3 row">
                                <label class="col-sm-4 col-form-label fw-semibold">Mã voucher</label>
                                <div class="col-sm-8">
                                    <input type="text" class="form-control text-uppercase" name="maKhuyenMai" th:value="${khuyenMai.maKhuyenMai}" required/>
                                </div>
                            </div>
                            <div class="mb-3 row">
                                <label class="col-sm-4 col-form-label fw-semibold">Loại giảm giá</label>
                                <div class="col-sm-8">
                                    <select class="form-select" name="loaiGiam" id="loaiGiam" onchange="toggleLoai()">
                                        <option value="PHAN_TRAM" th:selected="${khuyenMai.loaiGiam?.name() == 'PHAN_TRAM'}">Phần trăm (%)</option>
                                        <option value="SO_TIEN" th:selected="${khuyenMai.loaiGiam?.name() == 'SO_TIEN'}">Số tiền cố định (đ)</option>
                                    </select>
                                </div>
                            </div>
                            <div class="mb-3 row">
                                <label class="col-sm-4 col-form-label fw-semibold">Giá trị giảm</label>
                                <div class="col-sm-8">
                                    <div class="input-group">
                                        <input type="number" class="form-control" name="giaTriGiam" min="0" th:value="${khuyenMai.giaTriGiam}" required/>
                                        <span class="input-group-text" id="donViGiam" th:text="${khuyenMai.loaiGiam?.name() == 'PHAN_TRAM'} ? '%' : 'đ'">%</span>
                                    </div>
                                </div>
                            </div>
                            <div class="mb-3 row" id="giaTriToiDaRow">
                                <label class="col-sm-4 col-form-label fw-semibold">Giảm tối đa (đ)</label>
                                <div class="col-sm-8">
                                    <input type="number" class="form-control" name="giaTriToiDa" min="0" th:value="${khuyenMai.giaTriToiDa}"/>
                                </div>
                            </div>
                            <div class="mb-3 row">
                                <label class="col-sm-4 col-form-label fw-semibold">Đơn tối thiểu (đ)</label>
                                <div class="col-sm-8">
                                    <input type="number" class="form-control" name="donHangToiThieu" min="0" th:value="${khuyenMai.donHangToiThieu}"/>
                                </div>
                            </div>
                            <div class="mb-3 row">
                                <label class="col-sm-4 col-form-label fw-semibold">Số lượng tối đa</label>
                                <div class="col-sm-8">
                                    <input type="number" class="form-control" name="soLuongToiDa" min="1" th:value="${khuyenMai.soLuongToiDa}" required/>
                                </div>
                            </div>
                            <div class="mb-3 row">
                                <label class="col-sm-4 col-form-label fw-semibold">Ngày bắt đầu</label>
                                <div class="col-sm-8">
                                    <input type="datetime-local" class="form-control" name="ngayBatDau"
                                           th:value="${#temporals.format(khuyenMai.ngayBatDau, 'yyyy-MM-dd''T''HH:mm')}" required/>
                                </div>
                            </div>
                            <div class="mb-3 row">
                                <label class="col-sm-4 col-form-label fw-semibold">Ngày kết thúc</label>
                                <div class="col-sm-8">
                                    <input type="datetime-local" class="form-control" name="ngayKetThuc"
                                           th:value="${#temporals.format(khuyenMai.ngayKetThuc, 'yyyy-MM-dd''T''HH:mm')}" required/>
                                </div>
                            </div>
                            <div class="mb-3 row">
                                <label class="col-sm-4 col-form-label fw-semibold">Trạng thái</label>
                                <div class="col-sm-8">
                                    <select class="form-select" name="trangThai">
                                        <option value="DANG_HOAT_DONG" th:selected="${khuyenMai.trangThai?.name() == 'DANG_HOAT_DONG'}">Đang hoạt động</option>
                                        <option value="TAM_DUNG" th:selected="${khuyenMai.trangThai?.name() == 'TAM_DUNG'}">Tạm dừng</option>
                                    </select>
                                </div>
                            </div>
                            <div class="mb-3 row">
                                <label class="col-sm-4 col-form-label fw-semibold">Mô tả</label>
                                <div class="col-sm-8">
                                    <textarea class="form-control" name="moTa" rows="2" th:text="${khuyenMai.moTa}"></textarea>
                                </div>
                            </div>
                            <div class="text-end">
                                <a href="/quan-ly/khuyen-mai" class="btn btn-secondary me-2">Hủy</a>
                                <button type="submit" class="btn btn-primary">
                                    <i class="bi bi-check-circle me-1"></i>Lưu thay đổi
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function toggleLoai() {
        const loai = document.getElementById('loaiGiam').value;
        document.getElementById('donViGiam').textContent = loai === 'PHAN_TRAM' ? '%' : 'đ';
        document.getElementById('giaTriToiDaRow').style.display = loai === 'PHAN_TRAM' ? '' : 'none';
    }
    toggleLoai();
</script>
</body>
</html>

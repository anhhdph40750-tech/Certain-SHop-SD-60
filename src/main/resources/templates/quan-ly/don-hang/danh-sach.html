<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <title>Quản lý đơn hàng - Certain Shop</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link rel="stylesheet" th:href="@{/css/admin.css}"/>
</head>
<body>
<div class="d-flex">
    <div th:replace="~{fragments/admin-layout :: adminSidebar}"></div>

    <main class="flex-fill bg-light" style="min-height:100vh">
        <div class="bg-dark text-white px-4 py-2 d-flex align-items-center">
            <h5 class="mb-0 fw-bold"><i class="bi bi-bag-check me-2 text-warning"></i>Quản lý đơn hàng</h5>
        </div>

        <div class="container-fluid p-4">
            <div th:replace="~{fragments/admin-layout :: flashMessages}"></div>

            <!-- Bộ lọc -->
            <div class="card border-0 shadow-sm mb-4">
                <div class="card-body">
                    <form method="get" action="/quan-ly/don-hang" class="row g-3">
                        <div class="col-md-4">
                            <input type="text" class="form-control" name="tuKhoa"
                                   th:value="${tuKhoa}" placeholder="Mã, tên khách, SĐT..."/>
                        </div>
                        <div class="col-md-3">
                            <select class="form-select" name="trangThai">
                                <option value="">-- Tất cả trạng thái --</option>
                                <option th:each="tt : ${ {'CHO_XAC_NHAN','DANG_XU_LY','DANG_GIAO','DA_GIAO','DA_HUY','CHO_THANH_TOAN','DA_THANH_TOAN_TQ'}}"
                                        th:value="${tt}"
                                        th:text="${tt}"
                                        th:selected="${tt == trangThai}"></option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <select class="form-select" name="loai">
                                <option value="">-- Tất cả loại --</option>
                                <option value="ONLINE" th:selected="${loai=='ONLINE'}">Online</option>
                                <option value="TAI_QUAY" th:selected="${loai=='TAI_QUAY'}">Tại quầy</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="bi bi-search me-1"></i>Lọc
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Bảng đơn hàng -->
            <div class="card border-0 shadow-sm">
                <div class="card-body p-0">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-dark">
                        <tr>
                            <th>Mã đơn</th>
                            <th>Khách hàng</th>
                            <th>Loại</th>
                            <th class="text-center">Trạng thái</th>
                            <th class="text-end">Tổng tiền</th>
                            <th>Thời gian</th>
                            <th></th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="dh : ${danhSachDonHang}" th:if="${dh != null}">
                            <td><a th:href="@{/quan-ly/don-hang/} + ${dh.id}" class="text-decoration-none fw-semibold text-dark"
                                   th:text="${dh.maDonHang}">DH001</a></td>
                            <td>
                                <div th:if="${dh.nguoiDung != null}" th:text="${dh.nguoiDung.hoTen}">Nguyễn A</div>
                                <div th:if="${dh.tenNguoiNhan != null}" class="small text-muted" th:text="${dh.tenNguoiNhan}"></div>
                            </td>
                            <td>
                                <span th:if="${dh.loaiDonHang?.name() == 'TAI_QUAY'}" class="badge bg-secondary">Tại quầy</span>
                                <span th:if="${dh.loaiDonHang?.name() != 'TAI_QUAY'}" class="badge bg-info text-dark">Online</span>
                            </td>
                            <td class="text-center">
                                <span class="badge"
                                      th:classappend="${dh.trangThai?.name()} == 'DA_HUY' ? 'bg-danger' :
                                        (${dh.trangThai?.name()} == 'DA_GIAO' or ${dh.trangThai?.name()} == 'DA_THANH_TOAN_TQ') ? 'bg-success' :
                                        (${dh.trangThai?.name()} == 'DANG_GIAO') ? 'bg-warning text-dark' : 'bg-primary'"
                                      th:text="${dh.trangThai}">CHỜ</span>
                            </td>
                            <td class="text-end fw-bold text-danger"
                                th:text="${#numbers.formatDecimal(dh.tongThanhToan, 0, 'COMMA', 0, 'POINT')} + 'đ'">0đ</td>
                            <td class="small text-muted"
                                th:text="${#temporals.format(dh.ngayTao, 'dd/MM/yyyy HH:mm')}">01/01/2024</td>
                            <td>
                                <a th:href="@{/quan-ly/don-hang/} + ${dh.id}" class="btn btn-sm btn-outline-primary">
                                    <i class="bi bi-eye"></i>
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${danhSachDonHang == null or danhSachDonHang.empty}">
                            <td colspan="7" class="text-center text-muted py-4">Không có đơn hàng nào</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
                <!-- Phân trang -->
                <div class="card-footer bg-white d-flex justify-content-between align-items-center" th:if="${page != null}">
                    <span class="small text-muted">
                        Tổng <strong th:text="${page.totalElements}">0</strong> đơn hàng
                    </span>
                    <nav>
                        <ul class="pagination pagination-sm mb-0" th:if="${page.totalPages > 1}">
                            <li class="page-item" th:classappend="${page.first} ? 'disabled'">
                                <a class="page-link"
                                   th:href="@{/quan-ly/don-hang(trang=${page.number-1},tuKhoa=${tuKhoa},trangThai=${trangThai},loai=${loai})}">«</a>
                            </li>
                            <li th:each="i : ${#numbers.sequence(0, page.totalPages-1)}" class="page-item"
                                th:classappend="${i == page.number} ? 'active'">
                                <a class="page-link"
                                   th:href="@{/quan-ly/don-hang(trang=${i},tuKhoa=${tuKhoa},trangThai=${trangThai},loai=${loai})}"
                                   th:text="${i+1}">1</a>
                            </li>
                            <li class="page-item" th:classappend="${page.last} ? 'disabled'">
                                <a class="page-link"
                                   th:href="@{/quan-ly/don-hang(trang=${page.number+1},tuKhoa=${tuKhoa},trangThai=${trangThai},loai=${loai})}">»</a>
                            </li>
                        </ul>
                    </nav>
                </div>
            </div>
        </div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

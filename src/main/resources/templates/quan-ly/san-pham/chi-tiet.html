<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Chi tiết sản phẩm - Certain Shop</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link rel="stylesheet" th:href="@{/css/admin.css}"/>
</head>
<body>
<div class="d-flex">
    <div th:replace="~{fragments/admin-layout :: adminSidebar}"></div>

    <main class="flex-fill bg-light" style="min-height:100vh">
        <div class="bg-dark text-white px-4 py-2 d-flex align-items-center justify-content-between">
            <h5 class="mb-0 fw-bold"><i class="bi bi-pencil me-2 text-warning"></i>Sửa sản phẩm:
                <span th:text="${sanPham.tenSanPham}"></span>
            </h5>
            <a href="/quan-ly/san-pham" class="btn btn-outline-light btn-sm">
                <i class="bi bi-arrow-left me-1"></i>Quay lại
            </a>
        </div>

        <div class="container-fluid p-4">
            <div th:replace="~{fragments/admin-layout :: flashMessages}"></div>

            <!-- Tabs -->
            <ul class="nav nav-tabs mb-4" id="spTabs">
                <li class="nav-item"><a class="nav-link active" data-bs-toggle="tab" href="#thongTin">Thông tin</a></li>
                <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#bienThe">Biến thể</a></li>
                <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#hinhAnh">Hình ảnh</a></li>
            </ul>

            <div class="tab-content">
                <!-- Tab thông tin -->
                <div class="tab-pane fade show active" id="thongTin">
                    <form th:action="@{/quan-ly/san-pham/} + ${sanPham.id} + '/cap-nhat'" method="post" enctype="multipart/form-data">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <div class="row g-4">
                            <div class="col-lg-8">
                                <div class="card border-0 shadow-sm">
                                    <div class="card-header bg-white fw-bold border-bottom">Thông tin cơ bản</div>
                                    <div class="card-body">
                                        <div class="mb-3">
                                            <label class="form-label fw-semibold">Tên sản phẩm</label>
                                            <input type="text" class="form-control" name="tenSanPham"
                                                   th:value="${sanPham.tenSanPham}" required/>
                                        </div>
                                        <div class="row g-3">
                                            <div class="col-md-6">
                                                <label class="form-label fw-semibold">Danh mục</label>
                                                <select class="form-select" name="danhMucId">
                                                    <option th:each="dm : ${danhSachDanhMuc}"
                                                            th:value="${dm.id}" th:text="${dm.tenDanhMuc}"
                                                            th:selected="${dm.id == sanPham.danhMuc?.id}"></option>
                                                </select>
                                            </div>
                                            <div class="col-md-6">
                                                <label class="form-label fw-semibold">Thương hiệu</label>
                                                <select class="form-select" name="thuongHieuId">
                                                    <option value="">-- Không --</option>
                                                    <option th:each="th2 : ${danhSachThuongHieu}"
                                                            th:value="${th2.id}" th:text="${th2.tenThuongHieu}"
                                                            th:selected="${th2.id == sanPham.thuongHieu?.id}"></option>
                                                </select>
                                            </div>
                                            <div class="col-md-6">
                                                <label class="form-label fw-semibold">Giá bán</label>
                                                <input type="number" class="form-control" name="giaBan"
                                                       th:value="${sanPham.giaBan}" min="0"/>
                                            </div>
                                            <div class="col-md-6">
                                                <label class="form-label fw-semibold">Giá gốc</label>
                                                <input type="number" class="form-control" name="giaGoc"
                                                       th:value="${sanPham.giaGoc}" min="0"/>
                                            </div>
                                            <div class="col-md-6">
                                                <label class="form-label fw-semibold">Trạng thái</label>
                                                <select class="form-select" name="trangThai">
                                                    <option value="DANG_BAN" th:selected="${sanPham.trangThai?.name() == 'DANG_BAN'}">Đang bán</option>
                                                    <option value="NGUNG_BAN" th:selected="${sanPham.trangThai?.name() == 'NGUNG_BAN'}">Ngừng bán</option>
                                                </select>
                                            </div>
                                        </div>
                                        <div class="mt-3">
                                            <label class="form-label fw-semibold">Mô tả</label>
                                            <textarea class="form-control" name="moTa" rows="4" th:text="${sanPham.moTa}"></textarea>
                                        </div>
                                    </div>
                                    <div class="card-footer bg-white">
                                        <button type="submit" class="btn btn-primary">
                                            <i class="bi bi-check-circle me-1"></i>Lưu thay đổi
                                        </button>
                                    </div>
                                </div>
                            </div>
                            <div class="col-lg-4">
                                <div class="card border-0 shadow-sm">
                                    <div class="card-header bg-white fw-bold border-bottom">Ảnh chính</div>
                                    <div class="card-body text-center">
                                        <img id="anhHienTai"
                                             th:src="${sanPham.anhChinh != null} ? @{/uploads/} + ${sanPham.anhChinh} : @{/img/no-image.png}"
                                             style="width:100%;max-height:200px;object-fit:cover;border-radius:8px"/>
                                        <div class="mt-3">
                                            <input type="file" class="form-control" name="anhChinh" accept="image/*"
                                                   onchange="xemTruoc(this, 'anhHienTai')"/>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>

                <!-- Tab biến thể -->
                <div class="tab-pane fade" id="bienThe">
                    <div class="card border-0 shadow-sm">
                        <div class="card-header bg-white fw-bold border-bottom d-flex justify-content-between align-items-center">
                            <span>Danh sách biến thể</span>
                            <button class="btn btn-success btn-sm" data-bs-toggle="modal" data-bs-target="#themBienTheModal">
                                <i class="bi bi-plus me-1"></i>Thêm biến thể
                            </button>
                        </div>
                        <div class="card-body p-0">
                            <table class="table table-hover align-middle mb-0 small">
                                <thead class="table-light">
                                <tr>
                                    <th>Kích thước</th>
                                    <th>Màu sắc</th>
                                    <th class="text-center">Giá bán</th>
                                    <th class="text-center">Tồn kho</th>
                                    <th class="text-center">Trạng thái</th>
                                    <th></th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:each="bt : ${sanPham.bienThes}">
                                    <td th:text="${bt.kichThuoc?.tenKichThuoc}">M</td>
                                    <td>
                                        <span th:if="${bt.mauSac?.maHex != null}"
                                              th:style="'display:inline-block;width:16px;height:16px;border-radius:50%;background:' + ${bt.mauSac.maHex} + ';border:1px solid #ddd;vertical-align:middle;margin-right:4px'">&nbsp;</span>
                                        <span th:text="${bt.mauSac?.tenMauSac}">Đen</span>
                                    </td>
                                    <td class="text-center" th:text="${#numbers.formatDecimal(bt.giaBan ?: sanPham.giaBan, 0, 'COMMA', 0, 'POINT')} + 'đ'">0đ</td>
                                    <td class="text-center">
                                        <span class="badge" th:classappend="${bt.soLuongTon > 0} ? 'bg-success' : 'bg-danger'"
                                              th:text="${bt.soLuongTon}">0</span>
                                    </td>
                                    <td class="text-center">
                                        <span class="badge" th:classappend="${bt.trangThai?.name() == 'DANG_BAN'} ? 'bg-success' : 'bg-secondary'"
                                              th:text="${bt.trangThai?.name() == 'DANG_BAN'} ? 'Hoạt động' : 'Tạm khóa'">OK</span>
                                    </td>
                                    <td>
                                        <button class="btn btn-sm btn-outline-primary"
                                                th:onclick="'suaBienThe(' + ${bt.id} + ', ' + ${bt.soLuongTon} + ')'"
                                                type="button">
                                            <i class="bi bi-pencil"></i>
                                        </button>
                                    </td>
                                </tr>
                                <tr th:if="${sanPham.bienThes == null or sanPham.bienThes.empty}">
                                    <td colspan="6" class="text-center text-muted py-3">Chưa có biến thể</td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- Tab hình ảnh -->
                <div class="tab-pane fade" id="hinhAnh">
                    <div class="card border-0 shadow-sm">
                        <div class="card-header bg-white fw-bold border-bottom d-flex justify-content-between align-items-center">
                            <span>Hình ảnh sản phẩm</span>
                            <form th:action="@{/quan-ly/san-pham/} + ${sanPham.id} + '/them-anh'" method="post"
                                  enctype="multipart/form-data" class="d-flex gap-2">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <input type="file" class="form-control form-control-sm" name="files" accept="image/*" multiple required/>
                                <button type="submit" class="btn btn-success btn-sm">Upload</button>
                            </form>
                        </div>
                        <div class="card-body">
                            <div class="row g-3">
                                <div th:each="anh : ${danhSachAnh}" class="col-md-3 col-6">
                                    <div class="position-relative">
                                        <img th:src="@{/uploads/} + ${anh.duongDanAnh}"
                                             style="width:100%;height:150px;object-fit:cover;border-radius:8px"/>
                                        <form th:action="@{/quan-ly/san-pham/anh/} + ${anh.id} + '/xoa'" method="post"
                                              class="position-absolute top-0 end-0 m-1">
                                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                            <button type="submit" class="btn btn-danger btn-sm p-1" style="line-height:1">&times;</button>
                                        </form>
                                        <span th:if="${anh.laBienThe}" class="badge bg-warning text-dark position-absolute bottom-0 start-0 m-1">Biến thể</span>
                                    </div>
                                </div>
                                <div th:if="${danhSachAnh == null or danhSachAnh.empty}" class="col-12 text-center text-muted py-4">
                                    Chưa có hình ảnh
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- Modal thêm biến thể -->
<div class="modal fade" id="themBienTheModal" tabindex="-1">
    <div class="modal-dialog">
        <form th:action="@{/quan-ly/san-pham/} + ${sanPham.id} + '/them-bien-the'" method="post" class="modal-content">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="modal-header">
                <h5 class="modal-title">Thêm biến thể mới</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Kích thước</label>
                    <select class="form-select" name="kichThuocId" required>
                        <option value="">-- Chọn kích thước --</option>
                        <option th:each="kt : ${danhSachKichThuoc}"
                                th:value="${kt.id}" th:text="${kt.tenKichThuoc}"></option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Màu sắc</label>
                    <select class="form-select" name="mauSacId" required>
                        <option value="">-- Chọn màu sắc --</option>
                        <option th:each="ms : ${danhSachMauSac}"
                                th:value="${ms.id}" th:text="${ms.tenMauSac}"></option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Giá bán riêng (để trống = theo SP)</label>
                    <input type="number" class="form-control" name="giaBan" min="0" placeholder="0"/>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Số lượng tồn</label>
                    <input type="number" class="form-control" name="soLuongTon" min="0" value="0"/>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                <button type="submit" class="btn btn-success">Thêm biến thể</button>
            </div>
        </form>
    </div>
</div>

<!-- Modal sửa số lượng biến thể -->
<div class="modal fade" id="suaBienTheModal" tabindex="-1">
    <div class="modal-dialog">
        <form id="suaBienTheForm" method="post" class="modal-content">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="modal-header">
                <h5 class="modal-title">Cập nhật biến thể</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Số lượng tồn</label>
                    <input type="number" class="form-control" name="soLuongTon" id="soLuongSua" min="0"/>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                <button type="submit" class="btn btn-primary">Lưu</button>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    const spId = /*[[${sanPham.id}]]*/ 0;

    function suaBienThe(btId, soLuong) {
        document.getElementById('suaBienTheForm').action = '/quan-ly/san-pham/bien-the/' + btId + '/cap-nhat';
        document.getElementById('soLuongSua').value = soLuong;
        new bootstrap.Modal(document.getElementById('suaBienTheModal')).show();
    }

    function xemTruoc(input, imgId) {
        const img = document.getElementById(imgId);
        if (input.files && input.files[0]) {
            img.src = URL.createObjectURL(input.files[0]);
        }
    }
</script>
</body>
</html>

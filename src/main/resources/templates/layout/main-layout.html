<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi"
      th:fragment="layout (pageTitle, pageContent)">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${pageTitle} ?: 'Certain Shop - Bán hàng Online & Tại quầy'">Certain Shop</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS tùy chỉnh -->
    <link rel="stylesheet" th:href="@{/css/style.css}" href="/css/style.css"/>
</head>

<body class="bg-light">

<!-- Navbar rộng, hiện đại (giống ảnh 2) -->
<div th:replace="~{fragments/header :: header}"></div>

<!-- Nội dung chính -->
<main th:replace="${pageContent}"></main>

<!-- Footer -->
<footer class="bg-dark text-white text-center py-4">
    <div class="container">
        <p class="mb-1">© 2026 Certain Shop - Phần mềm bán hàng online & tại quầy</p>
        <p class="mb-0 small">Liên hệ: 090xxxxxxx | Email: support@certainshop.vn</p>
    </div>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

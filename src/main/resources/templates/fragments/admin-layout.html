<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="adminHead(tieuDe)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${tieuDe} + ' - Certain Shop Admin'">Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link rel="stylesheet" th:href="@{/css/admin.css}"/>
</head>
<body>

<!-- Sidebar admin -->
<div th:fragment="adminSidebar" class="d-flex flex-column p-3 bg-dark text-white sidebar-menu" style="min-height:100vh; width:250px;">
    <a th:href="@{/}" class="d-flex align-items-center mb-3 text-decoration-none text-white">
        <span class="fs-5 fw-bold"><span class="text-danger">CERTAIN</span>SHOP</span>
    </a>
    <hr class="border-secondary"/>

    <!-- Thông tin nhân viên -->
    <div class="d-flex align-items-center mb-3">
        <div class="rounded-circle bg-danger d-flex align-items-center justify-content-center me-2"
             style="width:36px;height:36px;">
            <i class="bi bi-person-fill text-white"></i>
        </div>
        <div>
            <div class="small fw-bold" sec:authentication="name">Nhân viên</div>
            <div class="x-small text-muted" style="font-size:0.75rem">
                <span sec:authorize="hasRole('ADMIN')" class="badge bg-danger">Admin</span>
                <span sec:authorize="hasRole('NHAN_VIEN')" class="badge bg-primary">Nhân viên</span>
            </div>
        </div>
    </div>
    <hr class="border-secondary"/>

    <ul class="nav nav-pills flex-column mb-auto">
        <li class="nav-item">
            <a th:href="@{/quan-ly/tong-quan}" class="nav-link text-white"
               th:classappend="${requestURI != null and requestURI.contains('tong-quan')} ? 'active'">
                <i class="bi bi-speedometer2 me-2"></i>Tổng quan
            </a>
        </li>
        <li class="nav-item">
            <a th:href="@{/quan-ly/ban-hang}" class="nav-link text-white"
               th:classappend="${requestURI != null and requestURI.contains('ban-hang')} ? 'active'">
                <i class="bi bi-cash-register me-2"></i>Bán hàng tại quầy
            </a>
        </li>
        <li class="nav-item">
            <a th:href="@{/quan-ly/don-hang}" class="nav-link text-white"
               th:classappend="${requestURI != null and requestURI.contains('/don-hang')} ? 'active'">
                <i class="bi bi-bag-check me-2"></i>Quản lý đơn hàng
            </a>
        </li>
        <li class="nav-item">
            <a th:href="@{/quan-ly/san-pham}" class="nav-link text-white"
               th:classappend="${requestURI != null and requestURI.contains('san-pham')} ? 'active'">
                <i class="bi bi-box-seam me-2"></i>Sản phẩm
            </a>
        </li>
        <li class="nav-item">
            <a th:href="@{/quan-ly/khuyen-mai}" class="nav-link text-white"
               th:classappend="${requestURI != null and requestURI.contains('khuyen-mai')} ? 'active'">
                <i class="bi bi-percent me-2"></i>Khuyến mãi
            </a>
        </li>
        <li class="nav-item">
            <a th:href="@{/quan-ly/nguoi-dung}" class="nav-link text-white"
               th:classappend="${requestURI != null and requestURI.contains('/nguoi-dung')} ? 'active'">
                <i class="bi bi-people me-2"></i>Khách hàng
            </a>
        </li>
        <li class="nav-item" sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/admin/nhan-vien}" class="nav-link text-white"
               th:classappend="${requestURI != null and requestURI.contains('/admin/')} ? 'active'">
                <i class="bi bi-person-badge me-2"></i>Nhân viên
            </a>
        </li>
        <!-- Quản lý thuộc tính -->
        <li class="nav-item">
            <a class="nav-link text-white collapsed" data-bs-toggle="collapse" href="#collapseAttr">
                <i class="bi bi-tags me-2"></i>Thuộc tính <i class="bi bi-chevron-down ms-auto"></i>
            </a>
            <div class="collapse" id="collapseAttr">
                <ul class="btn-toggle-nav list-unstyled ms-3">
                    <li><a th:href="@{/quan-ly/thuoc-tinh/danh-muc}" class="nav-link text-muted py-1">Danh mục</a></li>
                    <li><a th:href="@{/quan-ly/thuoc-tinh/thuong-hieu}" class="nav-link text-muted py-1">Thương hiệu</a></li>
                    <li><a th:href="@{/quan-ly/thuoc-tinh/kich-thuoc}" class="nav-link text-muted py-1">Kích thước</a></li>
                    <li><a th:href="@{/quan-ly/thuoc-tinh/mau-sac}" class="nav-link text-muted py-1">Màu sắc</a></li>
                    <li><a th:href="@{/quan-ly/thuoc-tinh/chat-lieu}" class="nav-link text-muted py-1">Chất liệu</a></li>
                </ul>
            </div>
        </li>
        <li class="nav-item">
            <a th:href="@{/quan-ly/doanh-thu}" class="nav-link text-white"
               th:classappend="${requestURI != null and requestURI.contains('doanh-thu')} ? 'active'">
                <i class="bi bi-bar-chart-line me-2"></i>Thống kê
            </a>
        </li>
    </ul>
    <hr class="border-secondary"/>
    <div class="d-flex gap-2">
        <a th:href="@{/}" class="btn btn-outline-light btn-sm flex-fill">
            <i class="bi bi-house me-1"></i>Trang chủ
        </a>
        <form th:action="@{/dang-xuat}" method="post" class="flex-fill">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button class="btn btn-outline-danger btn-sm w-100" type="submit">
                <i class="bi bi-box-arrow-right me-1"></i>Thoát
            </button>
        </form>
    </div>
</div>

<!-- Toast thông báo dùng chung -->
<div th:fragment="flashMessages" aria-live="polite" aria-atomic="true">
    <div th:if="${thanhCong}" class="toast-container position-fixed bottom-0 end-0 p-3">
        <div class="toast show align-items-center text-bg-success border-0" role="alert">
            <div class="d-flex">
                <div class="toast-body" th:text="${thanhCong}">Thành công</div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>
    <div th:if="${loiThongBao}" class="toast-container position-fixed bottom-0 end-0 p-3">
        <div class="toast show align-items-center text-bg-danger border-0" role="alert">
            <div class="d-flex">
                <div class="toast-body" th:text="${loiThongBao}">Lỗi</div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/admin.js}"></script>
</body>
</html>

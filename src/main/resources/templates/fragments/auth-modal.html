<div id="authModal" class="modal" th:fragment="authModal" style="display:none;">
    <div class="modal-content">
        <div class="modal-header">
            <span class="close" onclick="closeModal()">×</span>
            <div id="modalTitle">Đăng nhập</div>
        </div>
        <div class="form-content">
            <div id="loginForm">
                <div class="form-group">
                    <label>Email / SĐT</label>
                    <input type="text" placeholder="Nhập email hoặc số điện thoại">
                </div>
                <div class="form-group">
                    <label>Mật khẩu</label>
                    <input type="password" placeholder="Nhập mật khẩu">
                </div>
                <button class="btn-submit">ĐĂNG NHẬP</button>
                <div class="switch-link" onclick="showRegister()">
                    Chưa có tài khoản? <strong>Đăng ký ngay</strong>
                </div>
            </div>

            <div id="registerForm" style="display:none;">
                <div class="form-group">
                    <label>Họ và tên</label>
                    <input type="text" placeholder="Nhập họ và tên">
                </div>
                <div class="form-group">
                    <label>Email / SĐT</label>
                    <input type="text" placeholder="Nhập email hoặc số điện thoại">
                </div>
                <div class="form-group">
                    <label>Mật khẩu</label>
                    <input type="password" placeholder="Nhập mật khẩu">
                </div>
                <div class="form-group">
                    <label>Xác nhận mật khẩu</label>
                    <input type="password" placeholder="Nhập lại mật khẩu">
                </div>
                <button class="btn-submit">ĐĂNG KÝ</button>
                <div class="switch-link" onclick="showLogin()">
                    Đã có tài khoản? <strong>Quay lại đăng nhập</strong>
                </div>
            </div>
        </div>
    </div>
</div>

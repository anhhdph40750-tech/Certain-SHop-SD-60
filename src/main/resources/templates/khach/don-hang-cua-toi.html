<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Đơn hàng của tôi - Certain Shop</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="bg-light">
<div th:replace="~{fragments/layout :: header}"></div>

<main class="container py-4">
    <div class="row g-4">
        <!-- Sidebar tài khoản -->
        <div class="col-md-3">
            <div class="card border-0 shadow-sm">
                <div class="card-body text-center py-4">
                    <div class="rounded-circle bg-danger d-inline-flex align-items-center justify-content-center"
                         style="width:64px;height:64px">
                        <i class="bi bi-person-fill text-white fs-3"></i>
                    </div>
                    <h6 class="fw-bold mt-2" th:text="${nguoiDung.hoTen}">Tên</h6>
                </div>
                <div class="list-group list-group-flush">
                    <a th:href="@{/tai-khoan/thong-tin}" class="list-group-item list-group-item-action">
                        <i class="bi bi-person me-2"></i>Thông tin tài khoản
                    </a>
                    <a th:href="@{/don-hang/cua-toi}" class="list-group-item list-group-item-action active text-danger">
                        <i class="bi bi-bag-check me-2"></i>Đơn hàng của tôi
                    </a>
                    <a th:href="@{/tai-khoan/dia-chi}" class="list-group-item list-group-item-action">
                        <i class="bi bi-geo-alt me-2"></i>Địa chỉ
                    </a>
                    <a th:href="@{/doi-mat-khau}" class="list-group-item list-group-item-action">
                        <i class="bi bi-key me-2"></i>Đổi mật khẩu
                    </a>
                </div>
            </div>
        </div>

        <!-- Đơn hàng -->
        <div class="col-md-9">
            <h4 class="fw-bold mb-4"><i class="bi bi-bag-check text-danger me-2"></i>Đơn hàng của tôi</h4>

            <!-- Flash messages -->
            <div th:if="${thanhCong}" class="alert alert-success alert-dismissible fade show">
                <span th:text="${thanhCong}">OK</span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${loiThongBao}" class="alert alert-danger alert-dismissible fade show">
                <span th:text="${loiThongBao}">Error</span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div th:if="${danhSachDonHang == null or danhSachDonHang.isEmpty()}"
                 class="card border-0 shadow-sm text-center py-5">
                <i class="bi bi-bag-x text-muted" style="font-size:4rem"></i>
                <h5 class="text-muted mt-3">Bạn chưa có đơn hàng nào</h5>
                <a th:href="@{/}" class="btn btn-danger mt-3">Mua sắm ngay</a>
            </div>

            <div th:unless="${danhSachDonHang == null or danhSachDonHang.isEmpty()}"
                 class="d-flex flex-column gap-3">
                <div th:each="dh : ${danhSachDonHang}" class="card border-0 shadow-sm">
                    <div class="card-header bg-white d-flex justify-content-between align-items-center border-bottom">
                        <div>
                            <span class="fw-bold" th:text="${dh.maDonHang}">DH...</span>
                            <small class="text-muted ms-2"
                                   th:text="${#temporals.format(dh.thoiGianTao, 'dd/MM/yyyy HH:mm')}">Ngày</small>
                        </div>
                        <span class="badge rounded-pill"
                              th:classappend="${'bg-' + @trangThaiDonHang.layMauCss(dh.trangThai)}"
                              th:text="${@trangThaiDonHang.layNhan(dh.trangThai)}">Trạng thái</span>
                    </div>
                    <div class="card-body">
                        <!-- Sản phẩm trong đơn -->
                        <div th:each="ct, iter : ${dh.chiTiet}" th:if="${iter.index < 2}"
                             class="d-flex gap-3 mb-2">
                            <img th:if="${ct.bienThe.anhChinh != null}"
                                 th:src="@{'/uploads/' + ${ct.bienThe.anhChinh.duongDanAnh}}"
                                 style="width:50px;height:50px;object-fit:cover;border-radius:4px"/>
                            <img th:unless="${ct.bienThe.anhChinh != null}"
                                 th:src="@{/img/no-image.png}"
                                 style="width:50px;height:50px;object-fit:cover;border-radius:4px"/>
                            <div class="flex-fill">
                                <div class="small fw-semibold" th:text="${ct.bienThe.sanPham.tenSanPham}">Tên SP</div>
                                <small class="text-muted">
                                    <span th:text="${ct.bienThe.kichThuoc?.kichCo}">M</span> |
                                    <span th:text="${ct.bienThe.mauSac?.tenMau}">Đen</span> |
                                    x<span th:text="${ct.soLuong}">1</span>
                                </small>
                            </div>
                            <div class="text-danger fw-bold small"
                                 th:text="${#numbers.formatInteger(ct.donGia.longValue() * ct.soLuong, 0, 'COMMA') + 'đ'}">0đ</div>
                        </div>
                        <div th:if="${dh.chiTiet.size() > 2}" class="text-muted small">
                            + <span th:text="${dh.chiTiet.size() - 2}">0</span> sản phẩm khác
                        </div>
                    </div>
                    <div class="card-footer bg-white border-top d-flex justify-content-between align-items-center">
                        <div>
                            <span class="text-muted small">Tổng tiền: </span>
                            <span class="fw-bold text-danger"
                                  th:text="${#numbers.formatInteger(dh.tongTienSauGiam, 0, 'COMMA') + 'đ'}">0đ</span>
                        </div>
                        <div class="d-flex gap-2">
                            <!-- Nút hủy đơn -->
                            <form th:if="${dh.trangThai == 'CHO_XAC_NHAN'}"
                                  th:action="@{'/don-hang/huy/' + ${dh.id}}" method="post"
                                  onsubmit="return confirm('Bạn có chắc muốn hủy đơn hàng này?')">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button class="btn btn-outline-danger btn-sm" type="submit">Hủy đơn</button>
                            </form>
                            <!-- Nút thanh toán lại (VNPay) -->
                            <a th:if="${dh.trangThai == 'CHO_THANH_TOAN'}"
                               th:href="@{'/don-hang/thanh-toan-lai/' + ${dh.id}}"
                               class="btn btn-warning btn-sm">
                                <i class="bi bi-credit-card me-1"></i>Thanh toán
                            </a>
                            <a th:href="@{'/don-hang/cua-toi/' + ${dh.id}}"
                               class="btn btn-outline-dark btn-sm">
                                <i class="bi bi-eye me-1"></i>Chi tiết
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

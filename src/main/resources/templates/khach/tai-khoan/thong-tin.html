<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Tài khoản của tôi - Certain Shop</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/layout :: header}"></div>

<div class="container py-5">
    <div class="row g-4">
        <!-- Sidebar tài khoản -->
        <div class="col-lg-3">
            <div class="card border-0 shadow-sm text-center mb-4">
                <div class="card-body py-4">
                    <img th:if="${nguoiDung.anhDaiDien != null}"
                         th:src="@{/uploads/} + ${nguoiDung.anhDaiDien}"
                         style="width:80px;height:80px;border-radius:50%;object-fit:cover"/>
                    <div th:unless="${nguoiDung.anhDaiDien != null}"
                         class="bg-secondary text-white rounded-circle d-flex align-items-center justify-content-center mx-auto"
                         style="width:80px;height:80px;font-size:2rem"
                         th:text="${nguoiDung.hoTen?.substring(0,1)?.toUpperCase()}">A</div>
                    <h6 class="mt-2 fw-bold" th:text="${nguoiDung.hoTen}">Nguyễn A</h6>
                    <p class="text-muted small" th:text="${nguoiDung.email}">email@example.com</p>
                </div>
            </div>
            <div class="list-group list-group-flush shadow-sm rounded overflow-hidden">
                <a href="/tai-khoan/thong-tin" class="list-group-item list-group-item-action active"
                   aria-current="true">
                    <i class="bi bi-person me-2"></i>Thông tin cá nhân
                </a>
                <a href="/tai-khoan/doi-mat-khau" class="list-group-item list-group-item-action">
                    <i class="bi bi-lock me-2"></i>Đổi mật khẩu
                </a>
                <a href="/tai-khoan/dia-chi" class="list-group-item list-group-item-action">
                    <i class="bi bi-geo-alt me-2"></i>Địa chỉ giao hàng
                </a>
                <a href="/don-hang/cua-toi" class="list-group-item list-group-item-action">
                    <i class="bi bi-bag me-2"></i>Đơn hàng của tôi
                </a>
                <a href="/logout" class="list-group-item list-group-item-action text-danger">
                    <i class="bi bi-box-arrow-right me-2"></i>Đăng xuất
                </a>
            </div>
        </div>

        <!-- Nội dung chính -->
        <div class="col-lg-9">
            <!-- Flash messages -->
            <div th:if="${thanhCong}" class="alert alert-success alert-dismissible fade show" role="alert">
                <i class="bi bi-check-circle me-2"></i><span th:text="${thanhCong}">Thành công</span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${loi}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="bi bi-x-circle me-2"></i><span th:text="${loi}">Lỗi</span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white fw-bold border-bottom">
                    <i class="bi bi-person-circle me-2 text-primary"></i>Thông tin cá nhân
                </div>
                <form th:action="@{/tai-khoan/cap-nhat}" method="post" enctype="multipart/form-data" class="card-body">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                    <div class="text-center mb-4">
                        <div class="position-relative d-inline-block">
                            <img th:if="${nguoiDung.anhDaiDien != null}"
                                 th:src="@{/uploads/} + ${nguoiDung.anhDaiDien}"
                                 id="anhXemTruoc"
                                 style="width:120px;height:120px;border-radius:50%;object-fit:cover;border:3px solid #dee2e6"/>
                            <div th:unless="${nguoiDung.anhDaiDien != null}"
                                 id="anhXemTruocDiv"
                                 class="bg-secondary text-white rounded-circle d-flex align-items-center justify-content-center mx-auto"
                                 style="width:120px;height:120px;font-size:3rem"
                                 th:text="${nguoiDung.hoTen?.substring(0,1)?.toUpperCase()}">A</div>
                            <label class="position-absolute bottom-0 end-0 bg-primary text-white rounded-circle d-flex align-items-center justify-content-center"
                                   style="width:32px;height:32px;cursor:pointer" for="anhDaiDien">
                                <i class="bi bi-camera-fill"></i>
                            </label>
                            <input type="file" id="anhDaiDien" name="anhDaiDien" class="d-none" accept="image/*"
                                   onchange="xemTruocAnh(this)"/>
                        </div>
                    </div>

                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Họ và tên <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" name="hoTen" th:value="${nguoiDung.hoTen}" required/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Email</label>
                            <input type="email" class="form-control bg-light" th:value="${nguoiDung.email}" disabled/>
                            <small class="text-muted">Email không thể thay đổi</small>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Số điện thoại</label>
                            <input type="text" class="form-control" name="soDienThoai" th:value="${nguoiDung.soDienThoai}"/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Ngày sinh</label>
                            <input type="date" class="form-control" name="ngaySinh"
                                   th:value="${nguoiDung.ngaySinh != null} ? ${#temporals.format(nguoiDung.ngaySinh, 'yyyy-MM-dd')} : ''"/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Giới tính</label>
                            <select class="form-select" name="gioiTinh">
                                <option value="">-- Chọn giới tính --</option>
                                <option value="true" th:selected="${nguoiDung.gioiTinh == true}">Nam</option>
                                <option value="false" th:selected="${nguoiDung.gioiTinh == false}">Nữ</option>
                            </select>
                        </div>
                    </div>

                    <div class="mt-4 text-end">
                        <button type="submit" class="btn btn-primary px-4">
                            <i class="bi bi-check-circle me-1"></i>Lưu thay đổi
                        </button>
                    </div>
                </form>
            </div>

            <!-- Đổi mật khẩu -->
            <div class="card border-0 shadow-sm mt-4">
                <div class="card-header bg-white fw-bold border-bottom">
                    <i class="bi bi-lock me-2 text-primary"></i>Đổi mật khẩu
                </div>
                <form th:action="@{/tai-khoan/doi-mat-khau}" method="post" class="card-body">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Mật khẩu hiện tại</label>
                        <input type="password" class="form-control" name="matKhauCu" required/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Mật khẩu mới</label>
                        <input type="password" class="form-control" name="matKhauMoi" required minlength="8"/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Xác nhận mật khẩu mới</label>
                        <input type="password" class="form-control" name="xacNhanMatKhau" required/>
                    </div>
                    <div class="text-end">
                        <button type="submit" class="btn btn-warning px-4">
                            <i class="bi bi-lock me-1"></i>Đổi mật khẩu
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function xemTruocAnh(input) {
        if (input.files && input.files[0]) {
            const url = URL.createObjectURL(input.files[0]);
            const img = document.getElementById('anhXemTruoc');
            if (img) {
                img.src = url;
            } else {
                const div = document.getElementById('anhXemTruocDiv');
                if (div) {
                    div.innerHTML = `<img src="${url}" style="width:120px;height:120px;border-radius:50%;object-fit:cover;border:3px solid #dee2e6"/>`;
                }
            }
        }
    }
</script>
</body>
</html>

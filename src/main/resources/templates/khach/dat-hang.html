<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Đặt hàng - Certain Shop</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="bg-light">
<div th:replace="~{fragments/layout :: header}"></div>

<main class="container py-4">
    <h2 class="fw-bold mb-4"><i class="bi bi-bag-check text-danger me-2"></i>Đặt hàng</h2>

    <form th:action="@{/dat-hang}" method="post" id="formDatHang">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="row g-4">
            <!-- Form thông tin giao hàng -->
            <div class="col-lg-7">
                <!-- Địa chỉ đã lưu -->
                <div class="card border-0 shadow-sm mb-3" th:if="${danhSachDiaChi != null and !danhSachDiaChi.isEmpty()}">
                    <div class="card-header bg-white fw-bold">
                        <i class="bi bi-geo-alt text-danger me-2"></i>Địa chỉ đã lưu
                    </div>
                    <div class="card-body">
                        <div th:each="dc : ${danhSachDiaChi}" class="form-check mb-2">
                            <input class="form-check-input" type="radio" name="diaChiId"
                                   th:value="${dc.id}" th:id="'dc-' + ${dc.id}"
                                   th:checked="${dc.laMacDinh}"
                                   onchange="chonDiaChi(this)"/>
                            <label class="form-check-label" th:for="'dc-' + ${dc.id}">
                                <strong th:text="${dc.tenNguoiNhan}">Tên</strong>
                                <span class="text-muted ms-2" th:text="${dc.soDienThoai}">SĐT</span>
                                <br/>
                                <small class="text-muted" th:text="${dc.diaChiDayDu}">Địa chỉ đầy đủ</small>
                            </label>
                        </div>
                        <a class="btn btn-outline-secondary btn-sm mt-1" href="#" onclick="toggleNewAddress()">
                            <i class="bi bi-plus me-1"></i>Dùng địa chỉ khác
                        </a>
                    </div>
                </div>

                <!-- Nhập địa chỉ mới -->
                <div class="card border-0 shadow-sm" id="mauDiaChiMoi"
                     th:classappend="${danhSachDiaChi == null or danhSachDiaChi.isEmpty()} ? '' : 'd-none'">
                    <div class="card-header bg-white fw-bold">
                        <i class="bi bi-geo text-danger me-2"></i>Địa chỉ giao hàng
                    </div>
                    <div class="card-body">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Tên người nhận <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" name="tenNguoiNhan"
                                       th:value="${nguoiDung.hoTen}" required/>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Số điện thoại <span class="text-danger">*</span></label>
                                <input type="tel" class="form-control" name="soDienThoai"
                                       th:value="${nguoiDung.soDienThoai}" required/>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Tỉnh/Thành <span class="text-danger">*</span></label>
                                <select class="form-select" id="selTinh" name="maTinhGHN" onchange="taiHuyen()" required>
                                    <option value="">-- Chọn tỉnh --</option>
                                </select>
                                <input type="hidden" name="tenTinh" id="tenTinh"/>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Quận/Huyện <span class="text-danger">*</span></label>
                                <select class="form-select" id="selHuyen" name="maHuyenGHN" onchange="taiXa()" required>
                                    <option value="">-- Chọn huyện --</option>
                                </select>
                                <input type="hidden" name="tenHuyen" id="tenHuyen"/>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Phường/Xã <span class="text-danger">*</span></label>
                                <select class="form-select" id="selXa" name="maXaGHN" onchange="tinhPhiShip()" required>
                                    <option value="">-- Chọn xã --</option>
                                </select>
                                <input type="hidden" name="tenXa" id="tenXa"/>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Địa chỉ chi tiết <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" name="diaChiCuThe"
                                       placeholder="Số nhà, tên đường, khu vực..." required/>
                            </div>
                            <div class="col-12">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" name="luuDiaChi" id="luuDiaChi" value="true"/>
                                    <label class="form-check-label" for="luuDiaChi">Lưu địa chỉ này</label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Ghi chú -->
                <div class="card border-0 shadow-sm mt-3">
                    <div class="card-body">
                        <label class="form-label fw-semibold">Ghi chú đơn hàng</label>
                        <textarea class="form-control" name="ghiChu" rows="2"
                                  placeholder="Giao hàng giờ hành chính, gọi trước..."></textarea>
                    </div>
                </div>
            </div>

            <!-- Tóm tắt đơn hàng -->
            <div class="col-lg-5">
                <div class="card border-0 shadow-sm sticky-top" style="top:80px">
                    <div class="card-header bg-white fw-bold border-bottom">
                        <i class="bi bi-receipt text-danger me-2"></i>Đơn hàng của bạn
                    </div>
                    <div class="card-body">
                        <!-- Danh sách sản phẩm -->
                        <div th:each="ct : ${gioHang.chiTiet}" class="d-flex gap-2 mb-3 pb-3 border-bottom">
                            <img th:if="${ct.bienThe.anhChinh != null}"
                                 th:src="@{'/uploads/' + ${ct.bienThe.anhChinh.duongDanAnh}}"
                                 style="width:50px;height:50px;object-fit:cover;border-radius:4px"/>
                            <img th:unless="${ct.bienThe.anhChinh != null}"
                                 th:src="@{/img/no-image.png}"
                                 style="width:50px;height:50px;object-fit:cover;border-radius:4px"/>
                            <div class="flex-fill">
                                <div class="small fw-semibold" th:text="${ct.bienThe.sanPham.tenSanPham}">Tên</div>
                                <div class="text-muted" style="font-size:0.8rem">
                                    <span th:text="${ct.bienThe.kichThuoc?.kichCo}">M</span> |
                                    <span th:text="${ct.bienThe.mauSac?.tenMau}">Đen</span> | x<span th:text="${ct.soLuong}">1</span>
                                </div>
                            </div>
                            <div class="text-danger fw-bold small"
                                 th:text="${#numbers.formatInteger(ct.bienThe.giaBan.longValue() * ct.soLuong, 0, 'COMMA') + 'đ'}">0đ</div>
                        </div>

                        <!-- Voucher -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold small">Mã voucher</label>
                            <div class="input-group input-group-sm">
                                <input type="text" class="form-control" id="maVoucher" placeholder="Nhập mã giảm giá"/>
                                <button class="btn btn-outline-danger" type="button" onclick="apVoucher()">Áp dụng</button>
                            </div>
                            <div id="thongBaoVoucher" class="small mt-1"></div>
                        </div>
                        <input type="hidden" name="khuyenMaiId" id="khuyenMaiId"/>

                        <!-- Tóm tắt giá -->
                        <div class="d-flex justify-content-between mb-1">
                            <span class="text-muted">Tạm tính</span>
                            <span id="tamTinh"
                                  th:text="${#numbers.formatInteger(
                                      gioHang.chiTiet.stream().mapToLong(ct -> ct.bienThe.giaBan.longValue() * ct.soLuong).sum(),
                                      0, 'COMMA') + 'đ'}">0đ</span>
                        </div>
                        <div class="d-flex justify-content-between mb-1">
                            <span class="text-muted">Giảm giá</span>
                            <span class="text-success" id="soTienGiam">-0đ</span>
                        </div>
                        <div class="d-flex justify-content-between mb-1">
                            <span class="text-muted">Phí vận chuyển</span>
                            <span id="phiVanChuyen">Đang tính...</span>
                        </div>
                        <input type="hidden" name="phiVanChuyen" id="phiVanChuyenInput" value="0"/>
                        <hr/>
                        <div class="d-flex justify-content-between fw-bold">
                            <span>Tổng cộng</span>
                            <span class="text-danger fs-5" id="tongCong">0đ</span>
                        </div>

                        <!-- Phương thức thanh toán -->
                        <div class="mt-3">
                            <label class="form-label fw-semibold">Phương thức thanh toán</label>
                            <div class="form-check mb-2">
                                <input class="form-check-input" type="radio" name="phuongThucThanhToan"
                                       value="COD" id="ptCOD" checked/>
                                <label class="form-check-label" for="ptCOD">
                                    <i class="bi bi-cash-coin text-success me-1"></i>
                                    Thanh toán khi nhận hàng (COD)
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="phuongThucThanhToan"
                                       value="VNPAY" id="ptVNPay"/>
                                <label class="form-check-label" for="ptVNPay">
                                    <i class="bi bi-qr-code text-info me-1"></i>
                                    Thanh toán VNPay (ATM/Internet Banking)
                                </label>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-danger w-100 mt-3 py-2 fw-bold">
                            <i class="bi bi-bag-check me-2"></i>Đặt hàng
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </form>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let tamTinhRaw = 0;
    let giamGia = 0;
    let phiShipRaw = 0;

    // Khởi tạo tổng tiền
    document.addEventListener('DOMContentLoaded', () => {
        const el = document.getElementById('tamTinh');
        if (el) {
            tamTinhRaw = parseInt(el.textContent.replace(/[^0-9]/g, '')) || 0;
        }
        taiTinh();
    });

    async function taiTinh() {
        const res = await fetch('/api/dia-chi/tinh-thanh');
        const data = await res.json();
        const sel = document.getElementById('selTinh');
        if (!sel) return;
        sel.innerHTML = '<option value="">-- Chọn tỉnh --</option>';
        (data.data || []).forEach(t => {
            sel.innerHTML += `<option value="${t.ProvinceID}">${t.ProvinceName}</option>`;
        });
    }

    async function taiHuyen() {
        const maTinh = document.getElementById('selTinh').value;
        document.getElementById('tenTinh').value = document.getElementById('selTinh').selectedOptions[0]?.text || '';
        if (!maTinh) return;
        const res = await fetch(`/api/dia-chi/quan-huyen?maTinh=${maTinh}`);
        const data = await res.json();
        const sel = document.getElementById('selHuyen');
        sel.innerHTML = '<option value="">-- Chọn huyện --</option>';
        (data.data || []).forEach(h => {
            sel.innerHTML += `<option value="${h.DistrictID}">${h.DistrictName}</option>`;
        });
        document.getElementById('selXa').innerHTML = '<option value="">-- Chọn xã --</option>';
    }

    async function taiXa() {
        const maHuyen = document.getElementById('selHuyen').value;
        document.getElementById('tenHuyen').value = document.getElementById('selHuyen').selectedOptions[0]?.text || '';
        if (!maHuyen) return;
        const res = await fetch(`/api/dia-chi/phuong-xa?maHuyen=${maHuyen}`);
        const data = await res.json();
        const sel = document.getElementById('selXa');
        sel.innerHTML = '<option value="">-- Chọn xã --</option>';
        (data.data || []).forEach(x => {
            sel.innerHTML += `<option value="${x.WardCode}">${x.WardName}</option>`;
        });
    }

    async function tinhPhiShip() {
        const maHuyen = document.getElementById('selHuyen').value;
        const maXa = document.getElementById('selXa').value;
        document.getElementById('tenXa').value = document.getElementById('selXa').selectedOptions[0]?.text || '';
        if (!maHuyen || !maXa) return;

        const phiEl = document.getElementById('phiVanChuyen');
        phiEl.textContent = 'Đang tính...';

        const res = await fetch(`/dat-hang/tinh-phi-ship?maHuyen=${maHuyen}&maXa=${maXa}`, {method: 'POST'});
        const data = await res.json();
        phiShipRaw = data.phiVanChuyen || 30000;
        document.getElementById('phiVanChuyenInput').value = phiShipRaw;
        phiEl.textContent = formatSo(phiShipRaw) + 'đ';
        capNhatTong();
    }

    async function apVoucher() {
        const ma = document.getElementById('maVoucher').value.trim();
        if (!ma) return;
        const res = await fetch(`/dat-hang/ap-voucher?maVoucher=${ma}&tongTien=${tamTinhRaw}`, {method: 'POST'});
        const data = await res.json();
        const el = document.getElementById('thongBaoVoucher');
        if (data.thanhCong) {
            giamGia = data.soTienGiam;
            document.getElementById('khuyenMaiId').value = data.khuyenMaiId;
            document.getElementById('soTienGiam').textContent = '-' + formatSo(giamGia) + 'đ';
            el.className = 'small mt-1 text-success';
            el.textContent = '✓ ' + data.thongBao;
            capNhatTong();
        } else {
            el.className = 'small mt-1 text-danger';
            el.textContent = '✗ ' + data.thongBao;
        }
    }

    function capNhatTong() {
        const tong = tamTinhRaw - giamGia + phiShipRaw;
        document.getElementById('tongCong').textContent = formatSo(Math.max(0, tong)) + 'đ';
    }

    function toggleNewAddress() {
        const el = document.getElementById('mauDiaChiMoi');
        el.classList.toggle('d-none');
    }

    function chonDiaChi(radio) {
        document.getElementById('mauDiaChiMoi').classList.add('d-none');
    }

    function formatSo(n) {
        return Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    }
</script>
</body>
</html>

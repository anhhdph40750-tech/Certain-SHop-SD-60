<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Tìm kiếm - Certain Shop</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="bg-light">

<div th:replace="~{fragments/layout :: header}"></div>

<main class="py-4">
    <div class="container">

        <!-- Breadcrumb -->
        <nav aria-label="breadcrumb" class="mb-4">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/}">Trang chủ</a></li>
                <li class="breadcrumb-item active">Tìm kiếm</li>
            </ol>
        </nav>

        <!-- Search form -->
        <div class="card border-0 shadow-sm mb-4">
            <div class="card-body">
                <form th:action="@{/tim-kiem}" method="get" class="row g-3 align-items-end">
                    <div class="col-md-5">
                        <label class="form-label fw-semibold">Từ khóa</label>
                        <input type="text" class="form-control" name="q" th:value="${tuKhoa}"
                               placeholder="Nhập tên sản phẩm..."/>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-semibold">Thương hiệu</label>
                        <select class="form-select" name="thuongHieuId">
                            <option value="">Tất cả</option>
                            <option th:each="th : ${danhSachThuongHieu}"
                                    th:value="${th.id}"
                                    th:text="${th.tenThuongHieu}"
                                    th:selected="${th.id == thuongHieuId}">
                            </option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <button type="submit" class="btn btn-danger w-100">
                            <i class="bi bi-search me-1"></i>Tìm kiếm
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Results header -->
        <div class="d-flex justify-content-between align-items-center mb-3" th:if="${ketQua != null}">
            <h5 class="mb-0 fw-bold">
                <span th:if="${tuKhoa != null and !#strings.isEmpty(tuKhoa)}">
                    Kết quả cho "<span class="text-danger" th:text="${tuKhoa}"></span>"
                </span>
                <span th:if="${tuKhoa == null or #strings.isEmpty(tuKhoa)}">Tất cả sản phẩm</span>
                — <span class="text-muted fs-6" th:text="${ketQua.totalElements} + ' sản phẩm'"></span>
            </h5>
        </div>

        <!-- Product grid -->
        <div class="row g-3" th:if="${ketQua != null and !ketQua.empty}">
            <div class="col-6 col-md-4 col-lg-3" th:each="sp : ${ketQua.content}">
                <div class="card border-0 shadow-sm h-100 product-card">
                    <a th:href="@{'/san-pham/' + ${sp.id}}" class="text-decoration-none">
                        <div class="position-relative overflow-hidden" style="height:220px">
                            <img th:src="${sp.anhChinh != null ? sp.anhChinh : '/images/no-image.png'}"
                                 class="card-img-top w-100 h-100"
                                 style="object-fit:cover"
                                 th:alt="${sp.tenSanPham}"/>
                        </div>
                        <div class="card-body p-2">
                            <p class="small text-muted mb-1" th:text="${sp.thuongHieu?.tenThuongHieu}"></p>
                            <h6 class="fw-semibold text-dark mb-1 text-truncate" th:text="${sp.tenSanPham}"></h6>
                            <div class="fw-bold text-danger"
                                 th:text="${#numbers.formatDecimal(sp.giaHienThi, 0, 'COMMA', 0, 'POINT')} + '₫'">
                            </div>
                        </div>
                    </a>
                    <div class="card-footer bg-white border-0 p-2">
                        <a th:href="@{'/san-pham/' + ${sp.id}}" class="btn btn-sm btn-outline-danger w-100">
                            Xem chi tiết
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Empty state -->
        <div class="text-center py-5" th:if="${ketQua == null or ketQua.empty}">
            <i class="bi bi-search display-1 text-muted"></i>
            <h4 class="mt-3 text-muted">Không tìm thấy sản phẩm</h4>
            <p class="text-muted">Thử tìm với từ khóa khác hoặc xem tất cả sản phẩm.</p>
            <a th:href="@{/}" class="btn btn-danger">Về trang chủ</a>
        </div>

        <!-- Pagination -->
        <nav class="mt-4" th:if="${ketQua != null and ketQua.totalPages > 1}">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${ketQua.first ? 'disabled' : ''}">
                    <a class="page-link" th:href="@{/tim-kiem(q=${tuKhoa}, thuongHieuId=${thuongHieuId}, trang=${ketQua.number - 1})}">
                        &laquo;
                    </a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(0, ketQua.totalPages - 1)}"
                    th:classappend="${i == ketQua.number ? 'active' : ''}">
                    <a class="page-link"
                       th:href="@{/tim-kiem(q=${tuKhoa}, thuongHieuId=${thuongHieuId}, trang=${i})}"
                       th:text="${i + 1}">1</a>
                </li>
                <li class="page-item" th:classappend="${ketQua.last ? 'disabled' : ''}">
                    <a class="page-link" th:href="@{/tim-kiem(q=${tuKhoa}, thuongHieuId=${thuongHieuId}, trang=${ketQua.number + 1})}">
                        &raquo;
                    </a>
                </li>
            </ul>
        </nav>

    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

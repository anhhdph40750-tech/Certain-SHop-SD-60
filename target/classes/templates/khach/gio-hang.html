<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Giỏ hàng - Certain Shop</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="bg-light">
<div th:replace="~{fragments/layout :: header}"></div>

<main class="container py-4">
    <h2 class="fw-bold mb-4"><i class="bi bi-cart3 text-danger me-2"></i>Giỏ hàng của bạn</h2>

    <div th:if="${gioHang == null or gioHang.chiTiet == null or gioHang.chiTiet.isEmpty()}"
         class="text-center py-5">
        <i class="bi bi-cart-x text-muted" style="font-size:5rem"></i>
        <h4 class="text-muted mt-3">Giỏ hàng của bạn đang trống</h4>
        <a th:href="@{/}" class="btn btn-danger mt-3">
            <i class="bi bi-arrow-left me-2"></i>Tiếp tục mua sắm
        </a>
    </div>

    <div th:unless="${gioHang == null or gioHang.chiTiet == null or gioHang.chiTiet.isEmpty()}"
         class="row g-4">
        <!-- Bảng giỏ hàng -->
        <div class="col-lg-8">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-0">
                    <table class="table align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Sản phẩm</th>
                                <th class="text-center">Đơn giá</th>
                                <th class="text-center">Số lượng</th>
                                <th class="text-center">Thành tiền</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="gioHangBody">
                            <tr th:each="ct : ${gioHang.chiTiet}" th:attr="data-id=${ct.id}">
                                <td>
                                    <div class="d-flex align-items-center gap-3">
                                        <img th:if="${ct.bienThe.anhChinh != null}"
                                             th:src="@{'/uploads/' + ${ct.bienThe.anhChinh.duongDanAnh}}"
                                             style="width:60px;height:60px;object-fit:cover;border-radius:6px"/>
                                        <img th:unless="${ct.bienThe.anhChinh != null}"
                                             th:src="@{/img/no-image.png}"
                                             style="width:60px;height:60px;object-fit:cover;border-radius:6px"/>
                                        <div>
                                            <div class="fw-semibold"
                                                 th:text="${ct.bienThe.sanPham.tenSanPham}">Tên SP</div>
                                            <small class="text-muted">
                                                Size: <span th:text="${ct.bienThe.kichThuoc?.kichCo}">M</span>
                                                | Màu: <span th:text="${ct.bienThe.mauSac?.tenMau}">Đen</span>
                                            </small>
                                        </div>
                                    </div>
                                </td>
                                <td class="text-center"
                                    th:text="${#numbers.formatInteger(ct.bienThe.giaBan, 0, 'COMMA') + 'đ'}">0đ</td>
                                <td class="text-center" style="width:140px">
                                    <div class="input-group input-group-sm">
                                        <button class="btn btn-outline-secondary"
                                                th:onclick="'capNhat(' + ${ct.id} + ', ' + ${ct.soLuong - 1} + ')'">-</button>
                                        <input type="number" class="form-control text-center sl-input"
                                               th:value="${ct.soLuong}" min="1" max="5"
                                               th:onchange="'capNhat(' + ${ct.id} + ', this.value)'"/>
                                        <button class="btn btn-outline-secondary"
                                                th:onclick="'capNhat(' + ${ct.id} + ', ' + ${ct.soLuong + 1} + ')'">+</button>
                                    </div>
                                </td>
                                <td class="text-center fw-bold text-danger thanh-tien"
                                    th:text="${#numbers.formatInteger(ct.bienThe.giaBan * ct.soLuong, 0, 'COMMA') + 'đ'}">0đ</td>
                                <td>
                                    <form th:action="@{'/gio-hang/xoa/' + ${ct.id}}" method="post">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                        <button class="btn btn-sm btn-outline-danger" type="submit">
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="d-flex justify-content-between mt-3">
                <a th:href="@{/}" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-left me-2"></i>Tiếp tục mua sắm
                </a>
            </div>
        </div>

        <!-- Tóm tắt đơn hàng -->
        <div class="col-lg-4">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white fw-bold border-bottom">
                    <i class="bi bi-receipt text-danger me-2"></i>Tóm tắt đơn hàng
                </div>
                <div class="card-body">
                    <div class="d-flex justify-content-between mb-2">
                        <span class="text-muted">Tạm tính</span>
                        <span class="fw-semibold" id="tongTam"
                              th:text="${#numbers.formatInteger(
                                  gioHang.chiTiet.stream().mapToLong(ct -> ct.bienThe.giaBan.longValue() * ct.soLuong).sum(),
                                  0, 'COMMA') + 'đ'}">0đ</span>
                    </div>
                    <div class="d-flex justify-content-between mb-2">
                        <span class="text-muted">Phí vận chuyển</span>
                        <span class="text-muted small">Tính khi đặt hàng</span>
                    </div>
                    <hr/>
                    <div class="d-flex justify-content-between fw-bold">
                        <span>Tổng cộng</span>
                        <span class="text-danger fs-5" id="tongCong"
                              th:text="${#numbers.formatInteger(
                                  gioHang.chiTiet.stream().mapToLong(ct -> ct.bienThe.giaBan.longValue() * ct.soLuong).sum(),
                                  0, 'COMMA') + 'đ'}">0đ</span>
                    </div>
                    <a th:href="@{/dat-hang}" class="btn btn-danger w-100 mt-3 py-2 fw-bold">
                        <i class="bi bi-bag-check me-2"></i>Đặt hàng ngay
                    </a>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function capNhat(chiTietId, soLuong) {
        soLuong = parseInt(soLuong);
        if (soLuong < 1) soLuong = 1;
        if (soLuong > 5) { alert('Mỗi sản phẩm tối đa 5 cái'); return; }
        fetch('/gio-hang/cap-nhat', {
            method: 'POST',
            headers: {'Content-Type': 'application/json', 'X-CSRF-TOKEN': getCsrfToken()},
            body: JSON.stringify({chiTietId: chiTietId, soLuong: soLuong})
        }).then(r => r.json()).then(d => {
            if (d.thanhCong) location.reload();
            else alert(d.thongBao);
        });
    }

    function getCsrfToken() {
        return document.querySelector('meta[name="_csrf"]')?.content || '';
    }
</script>
</body>
</html>

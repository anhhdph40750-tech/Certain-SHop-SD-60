<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Địa chỉ giao hàng - Certain Shop</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/layout :: header}"></div>

<div class="container py-5">
    <div class="row g-4">
        <!-- Sidebar -->
        <div class="col-lg-3">
            <div class="card border-0 shadow-sm text-center mb-4">
                <div class="card-body py-3">
                    <div class="bg-secondary text-white rounded-circle d-flex align-items-center justify-content-center mx-auto"
                         style="width:60px;height:60px;font-size:1.5rem"
                         th:text="${nguoiDung.hoTen?.substring(0,1)?.toUpperCase()}">A</div>
                    <h6 class="mt-2 mb-0 fw-bold" th:text="${nguoiDung.hoTen}">Nguyễn A</h6>
                </div>
            </div>
            <div class="list-group list-group-flush shadow-sm rounded overflow-hidden">
                <a href="/tai-khoan/thong-tin" class="list-group-item list-group-item-action">
                    <i class="bi bi-person me-2"></i>Thông tin cá nhân
                </a>
                <a href="/tai-khoan/doi-mat-khau" class="list-group-item list-group-item-action">
                    <i class="bi bi-lock me-2"></i>Đổi mật khẩu
                </a>
                <a href="/tai-khoan/dia-chi" class="list-group-item list-group-item-action active">
                    <i class="bi bi-geo-alt me-2"></i>Địa chỉ giao hàng
                </a>
                <a href="/don-hang/cua-toi" class="list-group-item list-group-item-action">
                    <i class="bi bi-bag me-2"></i>Đơn hàng của tôi
                </a>
                <a href="/logout" class="list-group-item list-group-item-action text-danger">
                    <i class="bi bi-box-arrow-right me-2"></i>Đăng xuất
                </a>
            </div>
        </div>

        <!-- Nội dung -->
        <div class="col-lg-9">
            <div th:if="${thanhCong}" class="alert alert-success alert-dismissible fade show">
                <i class="bi bi-check-circle me-2"></i><span th:text="${thanhCong}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${loi}" class="alert alert-danger alert-dismissible fade show">
                <i class="bi bi-x-circle me-2"></i><span th:text="${loi}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="fw-bold mb-0"><i class="bi bi-geo-alt text-primary me-2"></i>Địa chỉ giao hàng</h5>
                <button class="btn btn-success btn-sm" data-bs-toggle="modal" data-bs-target="#themDiaChiModal">
                    <i class="bi bi-plus me-1"></i>Thêm địa chỉ
                </button>
            </div>

            <!-- Danh sách địa chỉ -->
            <div th:each="dc : ${danhSachDiaChi}" class="card border-0 shadow-sm mb-3">
                <div class="card-body d-flex justify-content-between align-items-start">
                    <div>
                        <div class="fw-semibold" th:text="${dc.tenNguoiNhan}">Nguyễn A</div>
                        <div class="text-muted small" th:text="${dc.soDienThoai}">0900000000</div>
                        <div class="small mt-1" th:text="${dc.getDiaChiDayDu()}">Địa chỉ đầy đủ</div>
                        <span th:if="${dc.laMacDinh}" class="badge bg-success mt-1">Mặc định</span>
                    </div>
                    <div class="d-flex flex-column gap-2 ms-3">
                        <button class="btn btn-sm btn-outline-primary"
                                th:onclick="'suaDiaChi(' + ${dc.id} + ')'"
                                type="button">Sửa</button>
                        <form th:unless="${dc.laMacDinh}"
                              th:action="@{/tai-khoan/dia-chi/} + ${dc.id} + '/xoa'" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="btn btn-sm btn-outline-danger w-100"
                                    onclick="return confirm('Xóa địa chỉ này?')">Xóa</button>
                        </form>
                        <form th:unless="${dc.laMacDinh}"
                              th:action="@{/tai-khoan/dia-chi/} + ${dc.id} + '/mac-dinh'" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="btn btn-sm btn-outline-secondary w-100">Đặt mặc định</button>
                        </form>
                    </div>
                </div>
            </div>

            <div th:if="${danhSachDiaChi == null or danhSachDiaChi.empty}" class="text-center py-5 text-muted">
                <i class="bi bi-geo-alt" style="font-size:3rem"></i>
                <p class="mt-2">Chưa có địa chỉ nào</p>
            </div>
        </div>
    </div>
</div>

<!-- Modal thêm địa chỉ -->
<div class="modal fade" id="themDiaChiModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <form th:action="@{/tai-khoan/dia-chi/them}" method="post" class="modal-content">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="modal-header">
                <h5 class="modal-title">Thêm địa chỉ mới</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Họ tên người nhận <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" name="tenNguoiNhan" required/>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Số điện thoại <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" name="soDienThoai" required/>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Tỉnh/Thành phố</label>
                        <select class="form-select" id="tinhThanhMoi" name="tinhThanh" onchange="taiHuyenMoi(this.value)">
                            <option value="">-- Chọn tỉnh/thành --</option>
                            <option th:each="t : ${danhSachTinh}" th:value="${t.MaTinh}" th:text="${t.TenTinh}"
                                    th:data-ma="${t.MaTinh}"></option>
                        </select>
                        <input type="hidden" name="maTinhGHN" id="maTinhGHNMoi"/>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Quận/Huyện</label>
                        <select class="form-select" id="quanHuyenMoi" name="quanHuyen" onchange="taiXaMoi(this.value)" disabled>
                            <option value="">-- Chọn quận/huyện --</option>
                        </select>
                        <input type="hidden" name="maHuyenGHN" id="maHuyenGHNMoi"/>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Phường/Xã</label>
                        <select class="form-select" id="phuongXaMoi" name="phuongXa" disabled>
                            <option value="">-- Chọn phường/xã --</option>
                        </select>
                        <input type="hidden" name="maXaGHN" id="maXaGHNMoi"/>
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-semibold">Số nhà, đường phố <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" name="diaChiCuThe" required placeholder="VD: 123 Đường Trần Hưng Đạo"/>
                    </div>
                    <div class="col-12">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="laMacDinh" value="true" id="laMacDinhCheck"/>
                            <label class="form-check-label" for="laMacDinhCheck">Đặt làm địa chỉ mặc định</label>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                <button type="submit" class="btn btn-success">Lưu địa chỉ</button>
            </div>
        </form>
    </div>
</div>

<div th:replace="~{fragments/layout :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    async function taiHuyenMoi(maTinh) {
        const sel = document.getElementById('quanHuyenMoi');
        sel.innerHTML = '<option value="">-- Đang tải --</option>';
        sel.disabled = true;
        document.getElementById('phuongXaMoi').disabled = true;
        const res = await fetch('/api/dia-chi/quan-huyen?maTinh=' + maTinh);
        const data = await res.json();
        sel.innerHTML = '<option value="">-- Chọn quận/huyện --</option>' +
            data.map(h => `<option value="${h.TenHuyen}" data-ma="${h.MaHuyen}">${h.TenHuyen}</option>`).join('');
        sel.disabled = false;
    }

    async function taiXaMoi(tenHuyen) {
        const huyen = document.getElementById('quanHuyenMoi');
        const maHuyen = huyen.options[huyen.selectedIndex]?.dataset?.ma;
        document.getElementById('maHuyenGHNMoi').value = maHuyen || '';
        const sel = document.getElementById('phuongXaMoi');
        sel.innerHTML = '<option value="">-- Đang tải --</option>';
        sel.disabled = true;
        if (!maHuyen) return;
        const res = await fetch('/api/dia-chi/phuong-xa?maHuyen=' + maHuyen);
        const data = await res.json();
        sel.innerHTML = '<option value="">-- Chọn phường/xã --</option>' +
            data.map(x => `<option value="${x.TenXa}" data-ma="${x.MaXa}">${x.TenXa}</option>`).join('');
        sel.disabled = false;
    }

    document.getElementById('phuongXaMoi')?.addEventListener('change', function() {
        const maXa = this.options[this.selectedIndex]?.dataset?.ma;
        document.getElementById('maXaGHNMoi').value = maXa || '';
    });
    document.getElementById('tinhThanhMoi')?.addEventListener('change', function() {
        const ma = this.options[this.selectedIndex]?.dataset?.ma;
        document.getElementById('maTinhGHNMoi').value = ma || '';
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${danhMuc != null ? danhMuc.tenDanhMuc + ' - Certain Shop' : 'Danh mục - Certain Shop'}">
        Danh mục - Certain Shop
    </title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="bg-light">

<div th:replace="~{fragments/layout :: header}"></div>

<main class="py-4">
    <div class="container">

        <!-- Breadcrumb -->
        <nav aria-label="breadcrumb" class="mb-4">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/}">Trang chủ</a></li>
                <li class="breadcrumb-item active" th:text="${danhMuc != null ? danhMuc.tenDanhMuc : duongDan}">
                    Danh mục
                </li>
            </ol>
        </nav>

        <!-- Category header -->
        <div class="mb-4" th:if="${danhMuc != null}">
            <h2 class="fw-bold" th:text="${danhMuc.tenDanhMuc}">Danh mục</h2>
            <p class="text-muted" th:if="${danhMuc.moTa != null}" th:text="${danhMuc.moTa}"></p>
        </div>

        <!-- Results count -->
        <div class="d-flex justify-content-between align-items-center mb-3" th:if="${sanPham != null}">
            <span class="text-muted" th:text="${sanPham.totalElements} + ' sản phẩm'"></span>
        </div>

        <!-- Product grid -->
        <div class="row g-3" th:if="${sanPham != null and !sanPham.empty}">
            <div class="col-6 col-md-4 col-lg-3" th:each="sp : ${sanPham.content}">
                <div class="card border-0 shadow-sm h-100 product-card">
                    <a th:href="@{'/san-pham/' + ${sp.id}}" class="text-decoration-none">
                        <div class="position-relative overflow-hidden" style="height:220px">
                            <img th:src="${sp.anhChinh != null ? sp.anhChinh : '/images/no-image.png'}"
                                 class="card-img-top w-100 h-100"
                                 style="object-fit:cover"
                                 th:alt="${sp.tenSanPham}"/>
                        </div>
                        <div class="card-body p-2">
                            <p class="small text-muted mb-1" th:text="${sp.thuongHieu?.tenThuongHieu}"></p>
                            <h6 class="fw-semibold text-dark mb-1 text-truncate" th:text="${sp.tenSanPham}"></h6>
                            <div class="fw-bold text-danger"
                                 th:text="${#numbers.formatDecimal(sp.giaHienThi, 0, 'COMMA', 0, 'POINT')} + '₫'">
                            </div>
                        </div>
                    </a>
                    <div class="card-footer bg-white border-0 p-2">
                        <a th:href="@{'/san-pham/' + ${sp.id}}" class="btn btn-sm btn-outline-danger w-100">
                            Xem chi tiết
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Empty state -->
        <div class="text-center py-5" th:if="${sanPham == null or sanPham.empty}">
            <i class="bi bi-box-seam display-1 text-muted"></i>
            <h4 class="mt-3 text-muted">Chưa có sản phẩm</h4>
            <p class="text-muted">Danh mục này hiện chưa có sản phẩm nào.</p>
            <a th:href="@{/}" class="btn btn-danger">Về trang chủ</a>
        </div>

        <!-- Pagination -->
        <nav class="mt-4" th:if="${sanPham != null and sanPham.totalPages > 1}">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${sanPham.first ? 'disabled' : ''}">
                    <a class="page-link" th:href="@{'/danh-muc/' + ${duongDan}(trang=${sanPham.number - 1})}">&laquo;</a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(0, sanPham.totalPages - 1)}"
                    th:classappend="${i == sanPham.number ? 'active' : ''}">
                    <a class="page-link"
                       th:href="@{'/danh-muc/' + ${duongDan}(trang=${i})}"
                       th:text="${i + 1}">1</a>
                </li>
                <li class="page-item" th:classappend="${sanPham.last ? 'disabled' : ''}">
                    <a class="page-link" th:href="@{'/danh-muc/' + ${duongDan}(trang=${sanPham.number + 1})}">&raquo;</a>
                </li>
            </ul>
        </nav>

    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

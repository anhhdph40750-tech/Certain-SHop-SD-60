<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Quản lý khuyến mãi - Certain Shop</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link rel="stylesheet" th:href="@{/css/admin.css}"/>
</head>
<body>
<div class="d-flex">
    <div th:replace="~{fragments/admin-layout :: adminSidebar}"></div>

    <main class="flex-fill bg-light" style="min-height:100vh">
        <div class="bg-dark text-white px-4 py-2 d-flex align-items-center justify-content-between">
            <h5 class="mb-0 fw-bold"><i class="bi bi-tag me-2 text-warning"></i>Quản lý khuyến mãi</h5>
            <a href="/quan-ly/khuyen-mai/them-moi" class="btn btn-success btn-sm">
                <i class="bi bi-plus-circle me-1"></i>Tạo voucher
            </a>
        </div>

        <div class="container-fluid p-4">
            <div th:replace="~{fragments/admin-layout :: flashMessages}"></div>

            <!-- Bộ lọc -->
            <div class="card border-0 shadow-sm mb-4">
                <div class="card-body">
                    <form method="get" action="/quan-ly/khuyen-mai" class="row g-3">
                        <div class="col-md-5">
                            <input type="text" class="form-control" name="tuKhoa" th:value="${tuKhoa}" placeholder="Mã, tên khuyến mãi..."/>
                        </div>
                        <div class="col-md-4">
                            <select class="form-select" name="trangThai">
                                <option value="">-- Tất cả trạng thái --</option>
                                <option value="DANG_HOAT_DONG" th:selected="${trangThai=='DANG_HOAT_DONG'}">Đang hoạt động</option>
                                <option value="TAM_DUNG" th:selected="${trangThai=='TAM_DUNG'}">Tạm dừng</option>
                                <option value="HET_HAN" th:selected="${trangThai=='HET_HAN'}">Hết hạn</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="bi bi-search me-1"></i>Tìm kiếm
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Danh sách voucher -->
            <div class="card border-0 shadow-sm">
                <div class="card-body p-0">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-dark">
                        <tr>
                            <th>Mã voucher</th>
                            <th>Tên chương trình</th>
                            <th class="text-center">Loại giảm</th>
                            <th class="text-center">Mức giảm</th>
                            <th class="text-center">Đã dùng / Tổng</th>
                            <th>Hạn dùng</th>
                            <th class="text-center">Trạng thái</th>
                            <th class="text-center">Thao tác</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="km : ${danhSachKhuyenMai}">
                            <td>
                                <code th:text="${km.maKhuyenMai}" class="bg-light px-2 py-1 rounded fs-6">SALE10</code>
                            </td>
                            <td th:text="${km.tenKhuyenMai}">Giảm giá mùa hè</td>
                            <td class="text-center">
                                <span class="badge"
                                      th:classappend="${km.loaiGiam?.name() == 'PHAN_TRAM'} ? 'bg-info text-dark' : 'bg-secondary'"
                                      th:text="${km.loaiGiam?.name() == 'PHAN_TRAM'} ? 'Phần trăm' : 'Số tiền'">%</span>
                            </td>
                            <td class="text-center fw-bold">
                                <span th:if="${km.loaiGiam?.name() == 'PHAN_TRAM'}" th:text="${km.giaTriGiam} + '%'">10%</span>
                                <span th:unless="${km.loaiGiam?.name() == 'PHAN_TRAM'}" th:text="${#numbers.formatDecimal(km.giaTriGiam, 0, 'COMMA', 0, 'POINT')} + 'đ'">0đ</span>
                            </td>
                            <td class="text-center" th:text="${km.soLuongDaDung} + '/' + ${km.soLuongToiDa}">0/100</td>
                            <td class="small" th:text="${#temporals.format(km.ngayKetThuc, 'dd/MM/yyyy')}">31/12/2024</td>
                            <td class="text-center">
                                <span class="badge"
                                      th:classappend="${km.trangThai?.name() == 'DANG_HOAT_DONG'} ? 'bg-success' :
                                        (${km.trangThai?.name() == 'HET_HAN'}) ? 'bg-danger' : 'bg-secondary'"
                                      th:text="${km.trangThai}">OK</span>
                            </td>
                            <td class="text-center">
                                <a th:href="@{/quan-ly/khuyen-mai/} + ${km.id} + '/sua'" class="btn btn-sm btn-outline-primary">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <form th:action="@{/quan-ly/khuyen-mai/} + ${km.id} + '/xoa'" method="post" class="d-inline"
                                      onsubmit="return confirm('Xóa voucher này?')">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="btn btn-sm btn-outline-danger">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${danhSachKhuyenMai == null or danhSachKhuyenMai.empty}">
                            <td colspan="8" class="text-center text-muted py-4">Không có voucher nào</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
                <div class="card-footer bg-white d-flex justify-content-between align-items-center" th:if="${page != null}">
                    <span class="small text-muted">Tổng <strong th:text="${page.totalElements}">0</strong> voucher</span>
                    <nav>
                        <ul class="pagination pagination-sm mb-0" th:if="${page.totalPages > 1}">
                            <li class="page-item" th:classappend="${page.first} ? 'disabled'">
                                <a class="page-link" th:href="@{/quan-ly/khuyen-mai(trang=${page.number-1},tuKhoa=${tuKhoa},trangThai=${trangThai})}">«</a>
                            </li>
                            <li th:each="i : ${#numbers.sequence(0, page.totalPages-1)}" class="page-item"
                                th:classappend="${i == page.number} ? 'active'">
                                <a class="page-link" th:href="@{/quan-ly/khuyen-mai(trang=${i},tuKhoa=${tuKhoa},trangThai=${trangThai})}"
                                   th:text="${i+1}">1</a>
                            </li>
                            <li class="page-item" th:classappend="${page.last} ? 'disabled'">
                                <a class="page-link" th:href="@{/quan-ly/khuyen-mai(trang=${page.number+1},tuKhoa=${tuKhoa},trangThai=${trangThai})}">»</a>
                            </li>
                        </ul>
                    </nav>
                </div>
            </div>
        </div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Thêm sản phẩm mới - Certain Shop</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link rel="stylesheet" th:href="@{/css/admin.css}"/>
</head>
<body>
<div class="d-flex">
    <div th:replace="~{fragments/admin-layout :: adminSidebar}"></div>

    <main class="flex-fill bg-light" style="min-height:100vh">
        <div class="bg-dark text-white px-4 py-2 d-flex align-items-center justify-content-between">
            <h5 class="mb-0 fw-bold"><i class="bi bi-plus-circle me-2 text-warning"></i>Thêm sản phẩm mới</h5>
            <a href="/quan-ly/san-pham" class="btn btn-outline-light btn-sm">
                <i class="bi bi-arrow-left me-1"></i>Quay lại
            </a>
        </div>

        <div class="container-fluid p-4">
            <div th:replace="~{fragments/admin-layout :: flashMessages}"></div>

            <form th:action="@{/quan-ly/san-pham/luu}" method="post" enctype="multipart/form-data">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="row g-4">
                    <!-- Thông tin cơ bản -->
                    <div class="col-lg-8">
                        <div class="card border-0 shadow-sm mb-4">
                            <div class="card-header bg-white fw-bold border-bottom">Thông tin cơ bản</div>
                            <div class="card-body">
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Tên sản phẩm <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" name="tenSanPham" required placeholder="Nhập tên sản phẩm"/>
                                </div>
                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <label class="form-label fw-semibold">Danh mục <span class="text-danger">*</span></label>
                                        <select class="form-select" name="danhMucId" required>
                                            <option value="">-- Chọn danh mục --</option>
                                            <option th:each="dm : ${danhSachDanhMuc}"
                                                    th:value="${dm.id}" th:text="${dm.tenDanhMuc}"></option>
                                        </select>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label fw-semibold">Thương hiệu</label>
                                        <select class="form-select" name="thuongHieuId">
                                            <option value="">-- Chọn thương hiệu --</option>
                                            <option th:each="th2 : ${danhSachThuongHieu}"
                                                    th:value="${th2.id}" th:text="${th2.tenThuongHieu}"></option>
                                        </select>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label fw-semibold">Chất liệu</label>
                                        <select class="form-select" name="chatLieuId">
                                            <option value="">-- Chọn chất liệu --</option>
                                            <option th:each="cl : ${danhSachChatLieu}"
                                                    th:value="${cl.id}" th:text="${cl.tenChatLieu}"></option>
                                        </select>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label fw-semibold">Giá bán <span class="text-danger">*</span></label>
                                        <div class="input-group">
                                            <input type="number" class="form-control" name="giaBan" min="0" placeholder="0" required/>
                                            <span class="input-group-text">đ</span>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label fw-semibold">Giá gốc</label>
                                        <div class="input-group">
                                            <input type="number" class="form-control" name="giaGoc" min="0" placeholder="0"/>
                                            <span class="input-group-text">đ</span>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label fw-semibold">Trạng thái</label>
                                        <select class="form-select" name="trangThai">
                                            <option value="DANG_BAN">Đang bán</option>
                                            <option value="NGUNG_BAN">Ngừng bán</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="mt-3">
                                    <label class="form-label fw-semibold">Mô tả</label>
                                    <textarea class="form-control" name="moTa" rows="4" placeholder="Mô tả sản phẩm..."></textarea>
                                </div>
                            </div>
                        </div>

                        <!-- Biến thể -->
                        <div class="card border-0 shadow-sm">
                            <div class="card-header bg-white fw-bold border-bottom d-flex justify-content-between align-items-center">
                                <span>Biến thể sản phẩm</span>
                                <button type="button" class="btn btn-success btn-sm" onclick="themDongBienThe()">
                                    <i class="bi bi-plus me-1"></i>Thêm biến thể
                                </button>
                            </div>
                            <div class="card-body">
                                <div class="table-responsive">
                                    <table class="table table-bordered align-middle small" id="bienTheTable">
                                        <thead class="table-light">
                                        <tr>
                                            <th>Kích thước</th>
                                            <th>Màu sắc</th>
                                            <th>Giá bán riêng</th>
                                            <th>Số lượng tồn</th>
                                            <th></th>
                                        </tr>
                                        </thead>
                                        <tbody id="bienTheTbody">
                                        <tr id="mauDong" style="display:none">
                                            <td>
                                                <select class="form-select form-select-sm" name="bienThe[0].kichThuocId">
                                                    <option value="">-- Size --</option>
                                                    <option th:each="kt : ${danhSachKichThuoc}"
                                                            th:value="${kt.id}" th:text="${kt.tenKichThuoc}"></option>
                                                </select>
                                            </td>
                                            <td>
                                                <select class="form-select form-select-sm" name="bienThe[0].mauSacId">
                                                    <option value="">-- Màu --</option>
                                                    <option th:each="ms : ${danhSachMauSac}"
                                                            th:value="${ms.id}" th:text="${ms.tenMauSac}"></option>
                                                </select>
                                            </td>
                                            <td>
                                                <input type="number" class="form-control form-control-sm" name="bienThe[0].giaBan" min="0" placeholder="Theo SP"/>
                                            </td>
                                            <td>
                                                <input type="number" class="form-control form-control-sm" name="bienThe[0].soLuongTon" min="0" value="0"/>
                                            </td>
                                            <td>
                                                <button type="button" class="btn btn-sm btn-danger" onclick="this.closest('tr').remove()">
                                                    <i class="bi bi-trash"></i>
                                                </button>
                                            </td>
                                        </tr>
                                        </tbody>
                                    </table>
                                </div>
                                <div class="text-muted small"><i class="bi bi-info-circle me-1"></i>Giá bán riêng để trống sẽ dùng giá sản phẩm</div>
                            </div>
                        </div>
                    </div>

                    <!-- Sidebar ảnh -->
                    <div class="col-lg-4">
                        <div class="card border-0 shadow-sm">
                            <div class="card-header bg-white fw-bold border-bottom">Ảnh sản phẩm</div>
                            <div class="card-body">
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Ảnh chính</label>
                                    <input type="file" class="form-control" name="anhChinh" accept="image/*" onchange="xemTruoc(this, 'xemTruocAnh')"/>
                                    <img id="xemTruocAnh" src="#" style="display:none;width:100%;border-radius:8px;margin-top:8px;max-height:200px;object-fit:cover"/>
                                </div>
                                <div>
                                    <label class="form-label fw-semibold">Ảnh phụ</label>
                                    <input type="file" class="form-control" name="anhPhu" accept="image/*" multiple/>
                                    <small class="text-muted">Có thể chọn nhiều ảnh</small>
                                </div>
                            </div>
                            <div class="card-footer bg-white d-grid">
                                <button type="submit" class="btn btn-primary">
                                    <i class="bi bi-check-circle me-2"></i>Lưu sản phẩm
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    const danhSachKichThuoc = /*[[${danhSachKichThuoc}]]*/ [];
    const danhSachMauSac = /*[[${danhSachMauSac}]]*/ [];
    let soLuongDong = 0;

    function themDongBienThe() {
        const idx = soLuongDong++;
        const ktOptions = danhSachKichThuoc.map(kt => `<option value="${kt.id}">${kt.tenKichThuoc}</option>`).join('');
        const msOptions = danhSachMauSac.map(ms => `<option value="${ms.id}">${ms.tenMauSac}</option>`).join('');
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><select class="form-select form-select-sm" name="bienThe[${idx}].kichThuocId">
                <option value="">-- Size --</option>${ktOptions}
            </select></td>
            <td><select class="form-select form-select-sm" name="bienThe[${idx}].mauSacId">
                <option value="">-- Màu --</option>${msOptions}
            </select></td>
            <td><input type="number" class="form-control form-control-sm" name="bienThe[${idx}].giaBan" min="0" placeholder="Theo SP"/></td>
            <td><input type="number" class="form-control form-control-sm" name="bienThe[${idx}].soLuongTon" min="0" value="0"/></td>
            <td><button type="button" class="btn btn-sm btn-danger" onclick="this.closest('tr').remove()"><i class="bi bi-trash"></i></button></td>
        `;
        document.getElementById('bienTheTbody').appendChild(tr);
    }

    function xemTruoc(input, imgId) {
        const img = document.getElementById(imgId);
        if (input.files && input.files[0]) {
            img.src = URL.createObjectURL(input.files[0]);
            img.style.display = 'block';
        }
    }

    // Tự động thêm 1 dòng biến thể khi load
    themDongBienThe();
</script>
</body>
</html>
